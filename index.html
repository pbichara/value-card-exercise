<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Values Card Sort — Choose Language</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1410;
      --paper: #f5f0e8;
      --cream: #ede8dc;
      --accent: #b85c2a;
      --accent-light: #d4895e;
      --muted: #8a7d6e;
      --border: #cfc4b0;
      --card-bg: #faf7f2;
      --shadow: rgba(26,20,16,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--ink);
      color: var(--paper);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    h1 em { font-style: italic; color: var(--accent-light); }

    .tagline {
      font-size: 12px;
      line-height: 1.8;
      color: #9a8f82;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    .lang-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .lang-options {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 480px;
    }

    .lang-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 36px;
      min-width: 180px;
      background: #231f1b;
      border: 1px solid #3a332c;
      border-radius: 4px;
      text-decoration: none;
      color: var(--paper);
      transition: all 0.2s;
    }

    .lang-link:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--shadow);
      transform: translateY(-2px);
    }

    .lang-link .lang-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
    }

    .lang-link .lang-native {
      font-size: 14px;
      color: var(--accent-light);
      font-weight: 300;
    }

    .lang-link .lang-desc {
      font-size: 10px;
      color: #7a6e62;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="eyebrow">University of New Mexico · Miller et al., 2011</div>
  <h1>Personal <em>Values</em><br>Card Sort</h1>
  <p class="tagline">100 values. Five buckets. One ranking. A few minutes to map what drives you.</p>

  <p class="lang-label">Choose your language</p>
  <div class="lang-options">
    <a href="values-card-sort.html" class="lang-link">
      <span class="lang-name">English</span>
      <span class="lang-desc">Start the exercise in English</span>
    </a>
    <a href="values-card-sort-es.html" class="lang-link">
      <span class="lang-name">Español</span>
      <span class="lang-native">Español mexicano</span>
      <span class="lang-desc">Iniciar el ejercicio en español</span>
    </a>
  </div>
</body>
</html>
